<!DOCTYPE html>
<html>
<head>
    <title>數學運算</title>
</head>
<body>
    <h1>簡單數學運算</h1>
    <form method="POST">
        數字 X: <input type="number" step="any" name="x" required><br><br>
        
        運算符號: 
        <select name="opt">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select><br><br>
        
        數字 Y: <input type="number" step="any" name="y" required><br><br>
        
        <button type="submit">計算</button>
    </form>
    <br>
    <a href="/">回到網站首面</a>
</body>
</html>
